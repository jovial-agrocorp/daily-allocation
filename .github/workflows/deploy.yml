name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: dailyallocationreg.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            dailyallocationreg.azurecr.io/daily-allocation:latest
            dailyallocationreg.azurecr.io/daily-allocation:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          az containerapp update \
            -n daily-allocation-bot \
            -g Richard.Goh_rg_1323 \
            --image dailyallocationreg.azurecr.io/daily-allocation:${{ github.sha }}
